name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Instalar dependências
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src/
